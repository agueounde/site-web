<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Elite Financial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-dark text-slate-100">

    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <div class="logo-icon">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <span>Elite Financial</span>
                </a>
                <nav class="nav">
                    <a href="index.html" class="nav-link">Accueil</a>
                    <a href="features.html" class="nav-link">Fonctionnalités</a>
                    <a href="about.html" class="nav-link">À propos</a>
                </nav>
                <div class="header-actions">
                    <a href="register.html" class="btn btn-primary">S'inscrire</a>
                </div>
            </div>
        </div>
    </header>

    <!-- LOGIN SECTION -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Connexion Sécurisée</h1>
                    <p>Accédez à votre compte Elite Financial</p>
                </div>

                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label for="email">Adresse E-mail</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="email" name="email" placeholder="exemple@email.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-actions">
                        <label class="checkbox">
                            <input type="checkbox" name="remember">
                            <span>Se souvenir de moi</span>
                        </label>
                        <a href="#" class="link">Mot de passe oublié?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Se connecter</button>
                </form>

                <div class="auth-divider">Ou</div>

                <div class="social-login">
                    <button class="social-btn">
                        <i class="fa-brands fa-google"></i>
                        Google
                    </button>
                    <button class="social-btn">
                        <i class="fa-brands fa-linkedin"></i>
                        LinkedIn
                    </button>
                </div>

                <div class="auth-footer">
                    <p>Pas encore de compte? <a href="register.html" class="link">S'inscrire ici</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Elite Financial. Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
