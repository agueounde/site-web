<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S'inscrire - Elite Financial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-dark text-slate-100">

    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <div class="logo-icon">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <span>Elite Financial</span>
                </a>
                <nav class="nav">
                    <a href="index.html" class="nav-link">Accueil</a>
                    <a href="features.html" class="nav-link">Fonctionnalités</a>
                    <a href="about.html" class="nav-link">À propos</a>
                </nav>
                <div class="header-actions">
                    <a href="login.html" class="btn btn-secondary">Connexion</a>
                </div>
            </div>
        </div>
    </header>

    <!-- REGISTER SECTION -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Créer un Compte</h1>
                    <p>Rejoignez Elite Financial en quelques minutes</p>
                </div>

                <form class="auth-form" id="registerForm">
                    <div class="form-group">
                        <label for="fullname">Nom Complet</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" id="fullname" name="fullname" placeholder="Jean Dupont" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="reg-email">Adresse E-mail</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="reg-email" name="email" placeholder="exemple@email.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Téléphone</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-phone"></i>
                            <input type="tel" id="phone" name="phone" placeholder="+33 6 00 00 00 00">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="reg-password">Mot de passe</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="reg-password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirmer le mot de passe</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="confirm-password" name="confirm" placeholder="••••••••" required>
                        </div>
                    </div>

                    <label class="checkbox">
                        <input type="checkbox" name="terms" required>
                        <span>J'accepte les <a href="#" class="link">conditions d'utilisation</a> et la <a href="#" class="link">politique de confidentialité</a></span>
                    </label>

                    <button type="submit" class="btn btn-primary btn-block">Créer mon compte</button>
                </form>

                <div class="auth-divider">Ou</div>

                <div class="social-login">
                    <button class="social-btn">
                        <i class="fa-brands fa-google"></i>
                        Google
                    </button>
                    <button class="social-btn">
                        <i class="fa-brands fa-linkedin"></i>
                        LinkedIn
                    </button>
                </div>

                <div class="auth-footer">
                    <p>Vous avez déjà un compte? <a href="login.html" class="link">Se connecter ici</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Elite Financial. Tous droits réservés.</p>
            </div>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
